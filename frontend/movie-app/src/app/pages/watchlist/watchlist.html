<div class="watchlist-page">

  <div class="container py-5">

    <h1 class="title">

      Minha Watchlist

    </h1>

    <!-- NÃO LOGADO -->

    <div
      *ngIf="!usuarioLogado"
      class="empty-message">

      Inicie sessão para acessar
      sua watchlist.

    </div>

    <!-- SEM FILMES -->

    <div
      *ngIf="
        usuarioLogado &&
        filmes.length === 0
      "
      class="empty-message">

      Sua watchlist está vazia.

    </div>

    <!-- FILMES -->

    <div
      *ngIf="filmes.length > 0"
      class="row">

      <div
        *ngFor="let filme of filmes"
        class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div
          class="movie-card"
          [routerLink]="[
            '/movie',
            filme.id
          ]">

          <img
            [src]="filme.poster">

          <div class="movie-info">

            <h3>

              {{ filme.titulo }}

            </h3>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
