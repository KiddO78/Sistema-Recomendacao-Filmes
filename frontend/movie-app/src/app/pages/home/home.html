<div class="home-page">

  <!-- HERO -->

  <section class="hero">

    <div class="overlay">

      <div class="hero-content">

        <h1>

          Descubra Filmes Incríveis

        </h1>

        <p>

          Explore avaliações,
          favoritos e recomendações.

        </p>

      </div>

    </div>

  </section>

  <!-- FILMES -->

  <div class="container py-5">

    <h2 class="section-title">

      Filmes em destaque

    </h2>

    <div class="row">

      <div
        *ngFor="let filme of filmes"
        class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div class="movie-card"
          [routerLink]="['/movie', filme.id]">

          <img
            [src]="filme.poster"
            [alt]="filme.titulo">

          <div class="movie-info">

            <h3>

              {{ filme.titulo }}

            </h3>

            <p>

              {{ filme.genero }}
              •
              {{ filme.ano }}

            </p>

            <div class="nota">

              ⭐ {{ filme.nota }}

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
