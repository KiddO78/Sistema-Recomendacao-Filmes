<div 
    class="home-page">

  <!-- HERO -->

  <section

    class="hero-section"

    [style.background-image]="
      'linear-gradient(
        to right,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.5)
      ),
      url(' +
      'https://image.tmdb.org/t/p/original' +
        filmeAtual?.backdrop_path +
      ')'
    ">

    <div class="hero-content">

      <!-- POSTER -->

      <img

        class="hero-poster"

        [src]="
          'https://image.tmdb.org/t/p/w500' +
          filmeAtual?.poster_path
        ">

      <!-- INFO -->

      <div class="hero-info">

        <h1>

          {{ filmeAtual?.title }}

        </h1>

        <p>

          {{ filmeAtual?.overview }}

        </p>

        <div class="hero-buttons">

          <button

            class="btn-explorar"

            [routerLink]="[
              '/movie',
              filmeAtual.id
            ]">

            ▶ Explorar

          </button>

        </div>

      </div>

      <!-- THUMBNAILS -->

      <div class="hero-thumbs">

        <img

          *ngFor="
            let filme of trendingMovies;
            let i = index
          "

          [src]="
            'https://image.tmdb.org/t/p/w500' +
            filme.poster_path
          "

          [class.active]="
            i === bannerAtual
          "

          (click)="
            selecionarBanner(i)
          ">

      </div>

    </div>

  </section>

  <!-- TRENDING -->

  <section class="trending-section">

    <h2>

      🔥 Trending Now

    </h2>

    <div class="trending-carousel">

      <div

        *ngFor="
          let filme
          of trendingMovies
        "

        class="trending-card"

        [routerLink]="[
          '/movie',
          filme.id
        ]">

        <img

          [src]="
            'https://image.tmdb.org/t/p/w500' +
            filme.poster_path
          ">

        <div class="trending-info">

          <h3>

            {{ filme.title }}

          </h3>

          <p>

            ⭐
            {{ filme.vote_average.toFixed(1) }}

          </p>

        </div>

      </div>

    </div>

  </section>

  <!-- FILMES -->

  <div class="container py-5">

    <h2 class="section-title">

      Filmes em destaque

    </h2>

    <div class="row">

      <div

        *ngFor="
          let filme
          of trendingMovies
        "

        class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div

          class="movie-card"

          [routerLink]="[
            '/movie',
            filme.id
          ]">

          <img

            [src]="
              'https://image.tmdb.org/t/p/w500' +
              filme.poster_path
            "

            [alt]="filme.title">

          <div class="movie-info">

            <h3>

              {{ filme.title }}

            </h3>

            <p>

              📅
              {{ filme.release_date }}

            </p>

            <div class="nota">

              ⭐
              {{ filme.vote_average.toFixed(1) }}

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
