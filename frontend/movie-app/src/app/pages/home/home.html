<div class="home-page">

  <!-- HERO -->

  <section

    class="hero-section"

    [style.background-image]="
      'linear-gradient(
        to right,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.5)
      ),
      url(' +
      filmeAtual.banner +
      ')'
    ">

    <div class="hero-content">

      <!-- POSTER -->

      <img

        class="hero-poster"

        [src]="filmeAtual.poster">

      <!-- INFO -->

      <div class="hero-info">

        <h1>

          {{ filmeAtual.titulo }}

        </h1>

        <p>

          {{ filmeAtual.descricao }}

        </p>

        <div class="hero-buttons">

          <button

            class="btn-explorar"

            [routerLink]="[
              '/movie',
              filmeAtual.id
            ]">

            ▶ Explorar

          </button>

        </div>

      </div>

      <!-- THUMBNAILS -->

      <div class="hero-thumbs">

        <img

          *ngFor="
            let filme of banners;
            let i = index
          "

          [src]="filme.poster"

          [class.active]="
            i === bannerAtual
          "

          (click)="
            selecionarBanner(i)
          ">

      </div>

    </div>

  </section>

  <!-- TRENDING -->

  <section class="trending-section">

    <h2>

      🔥 Trending Now

    </h2>

    <div class="trending-carousel">

      <div

        *ngFor="
          let filme
          of trendingMovies
        "

        class="trending-card"

        [routerLink]="[
          '/movie',
          filme.id
        ]">

        <img
          [src]="filme.poster">

        <div class="trending-info">

          <h3>

            {{ filme.titulo }}

          </h3>

          <p>

            ⭐ {{ filme.nota }}

          </p>

        </div>

      </div>

    </div>

  </section>

  <!-- FILMES -->

  <div class="container py-5">

    <h2 class="section-title">

      Filmes em destaque

    </h2>

    <div class="row">

      <div

        *ngFor="
          let filme
          of filmes
        "

        class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div

          class="movie-card"

          [routerLink]="[
            '/movie',
            filme.id
          ]">

          <img

            [src]="filme.poster"

            [alt]="filme.titulo">

          <div class="movie-info">

            <h3>

              {{ filme.titulo }}

            </h3>

            <p>

              {{ filme.genero }}

              •

              {{ filme.ano }}

            </p>

            <div class="nota">

              ⭐ {{ filme.nota }}

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
