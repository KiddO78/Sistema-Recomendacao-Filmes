<div class="auth-container">

  <div class="auth-card">

    <h1 class="text-warning mb-4 text-center">
      MovieDB
    </h1>

    <h3 class="text-white text-center mb-4">
      Entrar
    </h3>

    <form (ngSubmit)="login()">

      <div class="mb-3">

        <input
          type="email"
          class="form-control"
          placeholder="Email"
          [(ngModel)]="email"
          name="email">

      </div>

      <div class="mb-3">

        <input
          type="password"
          class="form-control"
          placeholder="Senha"
          [(ngModel)]="senha"
          name="senha">

      </div>

      <button
        class="btn btn-warning w-100">

        Entrar

      </button>

    </form>

    <div
      *ngIf="erro"
      class="alert alert-danger mt-3">

      {{ erro }}

    </div>

  </div>

</div>
