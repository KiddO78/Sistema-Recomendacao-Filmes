<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

  <!-- LOGO -->

  <a
    class="navbar-brand fw-bold text-warning"
    routerLink="">

    MovieDB

  </a>

  <!-- PESQUISA -->

  <form 
    class="search-box d-flex"
    (ngSubmit)="pesquisar()"
    >

    <div
    *ngIf="resultados.length > 0"
    class="search-results">

        <div
            *ngFor="let filme of resultados"
            class="search-item"
            [routerLink]="[
            '/movie',
            filme.id
            ]">

            <img
            [src]="filme.poster">

            <span>

                {{ filme.titulo }}

            </span>

        </div>

    </div>

    <input
      type="text"
      placeholder="Pesquisar filmes..."
      [(ngModel)]="pesquisa"
      (input)="buscarSugestoes()"
      name="pesquisa"
      class="form-control">

    <button
      type="submit"
      class="btn-search">

      🔍

    </button>

  </form>

  <!-- BOTAO MOBILE -->

  <button
    class="navbar-toggler"
    type="button"
    data-bs-toggle="collapse"
    data-bs-target="#menu">

    <span class="navbar-toggler-icon"></span>

  </button>

  <!-- MENU -->

  <div
    class="collapse navbar-collapse mt-3 mt-lg-0"
    id="menu">

    <ul class="navbar-nav ms-auto">

      <li class="nav-item">

        <a
          class="nav-link"
          routerLink="">

          Home

        </a>

      </li>

      <li class="nav-item">

        <a
          class="nav-link"
          routerLink="/movies">

          Filmes

        </a>

      </li>

      <li class="nav-item">

        <a
          class="nav-link"
          routerLink="/favorites">

          Favoritos

        </a>

      </li>

      <li class="nav-item">

            <a
                class="nav-link"
                routerLink="/watchlist">

                Watchlist

            </a>

        </li>

      <!-- NÃO LOGADO -->

      <li
        *ngIf="!usuario"
        class="nav-item">

        <a
          class="nav-link"
          routerLink="/login">

          Entrar

        </a>

      </li>

      <!-- LOGADO -->

      <li
        *ngIf="usuario"
        class="nav-item dropdown">

        <a
          class="nav-link dropdown-toggle"
          href="#"
          data-bs-toggle="dropdown">

          👤 {{ usuario.nome }}

        </a>

        <ul class="dropdown-menu dropdown-menu-dark">

          <li>

            <a
              class="dropdown-item"
              href="#">

              Perfil

            </a>

          </li>

          <li>

            <button
              class="dropdown-item"
              (click)="logout()">

              🚪 Logout

            </button>

          </li>

        </ul>

      </li>

    </ul>

  </div>

</nav>
